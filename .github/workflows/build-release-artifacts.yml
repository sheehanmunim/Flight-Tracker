name: Build And Publish Release Artifacts

permissions:
  contents: write

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

jobs:
  windows:
    runs-on: windows-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Set up .NET 8
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "8.0.x"

      - name: Install Inno Setup
        shell: pwsh
        run: choco install innosetup --no-progress -y

      - name: Package Windows app
        shell: pwsh
        run: |
          $version = if ($env:GITHUB_REF -like 'refs/tags/v*') { $env:GITHUB_REF_NAME.TrimStart('v') } else { '1.0.0' }
          ./Windows/Build-FlightTracker-Windows.ps1 -AppVersion $version

      - name: Upload Windows artifacts
        uses: actions/upload-artifact@v4
        with:
          name: FlightTracker-Windows
          path: |
            output/windows/FlightTracker-Setup.exe
            output/windows/FlightTracker

  macos:
    runs-on: macos-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Build Mac app and DMG
        run: |
          chmod +x ./macOS/Build-FlightTracker-MacApp.sh
          ./macOS/Build-FlightTracker-MacApp.sh

      - name: Upload Mac artifacts
        uses: actions/upload-artifact@v4
        with:
          name: FlightTracker-Mac
          path: |
            output/macos/Flight Tracker.app
            output/macos/FlightTracker.dmg

  release:
    runs-on: ubuntu-latest
    needs:
      - windows
      - macos
    if: startsWith(github.ref, 'refs/tags/v')

    steps:
      - name: Download Windows artifact
        uses: actions/download-artifact@v4
        with:
          name: FlightTracker-Windows
          path: release-assets/windows

      - name: Download Mac artifact
        uses: actions/download-artifact@v4
        with:
          name: FlightTracker-Mac
          path: release-assets/macos

      - name: Create or update GitHub release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            release-assets/windows/FlightTracker-Setup.exe
            release-assets/macos/FlightTracker.dmg
