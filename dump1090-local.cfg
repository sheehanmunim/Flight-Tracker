#
# Local overrides for the bundled Windows dump1090 build.
# This keeps vendor files untouched and lets us prefer Windows geolocation
# instead of prompting through setup.exe on first launch.
#
include = %~dp0\vendor\Dump1090\dump1090.cfg

# Approximate location from current public IP geolocation.
# You can refine this later for better distance rings and MLAT use.
homepos = 41.3165,-73.0932
location = no
tui = wincon
console-icon = true
logfile = %~dp0\logs\dump1090.log
web-page = %~dp0\vendor\Dump1090\web_root-Tar1090\index.html
net-bo-port = 30005
